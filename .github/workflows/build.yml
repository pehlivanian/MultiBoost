name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            cmake \
            g++ \
            libarmadillo-dev \
            libopenblas-dev \
            liblapack-dev \
            libboost-filesystem-dev \
            libboost-system-dev \
            libboost-program-options-dev \
            libcereal-dev \
            libmlpack-dev \
            libcurl4-openssl-dev \
            libssl-dev \
            libgtest-dev \
            libbenchmark-dev

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTS=OFF \
            -DBUILD_BENCHMARKS=OFF \
            -DBUILD_THREADPOOL_TESTS=OFF \
            -DBUILD_THREADPOOL_BENCHMARKS=OFF \
            -DBUILD_TITANIC=OFF \
            -DBUILD_MULTICLASS=OFF \
            -DUSE_OPENMP=OFF \
            -DUSE_AUTODIFF=OFF \
            -DUSE_EIGEN=OFF

      - name: Build
        run: cmake --build build --parallel $(nproc) 2>&1

      - name: Report on failure
        if: failure()
        run: |
          echo "=== CMake cache (key vars) ==="
          grep -E "CMAKE_CXX|Armadillo|Boost|mlpack" build/CMakeCache.txt || true
